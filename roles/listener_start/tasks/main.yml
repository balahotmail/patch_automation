---
# roles/listener_start/tasks/main.yml
# Starts the listener only after patching.

- name: Ensure remote script directory exists
  shell: >
    mkdir -p "{{ target_script_dir }}"
  become: true
  become_user: "{{ oracle_os_user }}"

- name: Ensure remote log directory exists
  shell: >
    mkdir -p "{{ target_log_dir }}"
  become: true
  become_user: "{{ oracle_os_user }}"

- name: Copy listener_start.sh to target
  copy:
    src: listener_start.sh
    dest: "{{ target_script_dir }}/listener_start.sh"
    mode: "0755"
  become: true
  become_user: "{{ oracle_os_user }}"

- name: Run listener_start.sh
  command: "{{ target_script_dir }}/listener_start.sh {{ target_log_dir }}"
  become: true
  become_user: "{{ oracle_os_user }}"
  environment:
    EXPECTED_OS_USER: "{{ oracle_os_user }}"
    ORACLE_PROFILE: "{{ oracle_profile }}"
    ORAENV_PATH: "{{ oraenv_path }}"
    ORACLE_HOME: "{{ oracle_home }}"
    ORACLE_BASE: "{{ oracle_base }}"
    ORATAB: "{{ oratab_path }}"
  register: listener_start_result
  changed_when: true

- name: Show listener_start.sh output
  debug:
    var: listener_start_result.stdout_lines
